<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>인환 ♥ 진희 결혼식에 초대합니다</title>

<!-- SEO & 카카오톡 공유 미리보기 -->
<meta property="og:title" content="인환 ♥ 진희 결혼식에 초대합니다">
<meta property="og:description" content="2027년 2월 27일 토요일 오전 11시 | 경기교총웨딩하우스 수원">
<meta property="og:image" content="https://drive.google.com/drive/u/0/folders/1SFEL6gW0b_IFZ9QoeZZf3atoyPKeBnWa">
<meta property="og:type" content="website">
<meta name="description" content="김인환 ♥ 박진희 결혼식에 초대합니다. 2027년 2월 27일 토요일 오전 11시, 경기교총웨딩하우스 수원">

<!-- Favicon (선택) -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☘️</text></svg>">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #f2faf0;
    font-family: 'Noto Sans KR', sans-serif;
  }

  /* 로딩 화면 */
  .loading-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(170deg, #edfce8 0%, #f8fff5 30%, #fffefa 60%, #fef8f0 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }

  .loading-screen.hidden {
    opacity: 0;
    visibility: hidden;
  }

  .loading-shamrock {
    font-size: 48px;
    animation: pulse 1.5s ease-in-out infinite;
    margin-bottom: 20px;
  }

  .loading-text {
    font-size: 14px;
    color: #5c755e;
    letter-spacing: 2px;
    font-weight: 300;
  }

  .loading-names {
    font-size: 24px;
    color: #2d3a2e;
    font-weight: 300;
    margin-bottom: 8px;
    letter-spacing: 3px;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.15); opacity: 1; }
  }

  /* iframe 컨테이너 */
  .iframe-container {
    width: 100%;
    height: 100%;
    position: relative;
  }

  .iframe-container iframe {
    width: 100%;
    height: 100%;
    border: none;
    position: absolute;
    top: 0;
    left: 0;
  }
</style>
</head>
<body>

<!-- 로딩 화면 (GAS 로딩 동안 표시) -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-shamrock">☘️</div>
  <div class="loading-names">인환 & 진희</div>
  <div class="loading-text">초대장을 준비하고 있어요</div>
</div>

<!-- GAS 웹앱 iframe -->
<div class="iframe-container">
  <iframe 
    id="gasFrame"
    src="https://script.google.com/macros/s/AKfycbz0KQ48JUpvIu_KgATkJdoXbUmlEWbzeFDhSS6EDtNav_R87MGhcAWR4nbLU-USo6Ca/exec"
    allow="clipboard-write; autoplay"
    allowfullscreen
    loading="eager"
  ></iframe>
</div>

<script>
  // GAS iframe 로딩 완료 후 로딩 화면 숨기기
  var iframe = document.getElementById('gasFrame');
  var loadingScreen = document.getElementById('loadingScreen');

  iframe.addEventListener('load', function() {
    // iframe 로딩 후 약간의 딜레이를 줘서 콘텐츠 렌더링 시간 확보
    setTimeout(function() {
      loadingScreen.classList.add('hidden');
    }, 800);
  });

  // 안전장치: 8초 후에도 로딩 중이면 강제로 숨기기
  setTimeout(function() {
    loadingScreen.classList.add('hidden');
  }, 8000);
</script>

</body>
</html>
